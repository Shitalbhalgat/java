<!DOCTYPE html>
<html>
<head>
<title>Cookie Popup</title>

<style>
#popup {
	position: fixed;
	bottom: 20px;
	left: 20px;
	right: 20px;
	background: #333;
	color: white;
	padding: 20px;
}
</style>

</head>
<body>

	<h1>Welcome to My Website</h1>

	<div id="popup">

		This website uses cookies.

		<form action="AcceptCookieExample" method="post">

			<input type="submit" value="Accept">

		</form>

	</div>

</body>
</html>
